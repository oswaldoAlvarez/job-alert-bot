name: Job alert every 12 hours

on:
  schedule:
    - cron: "0 0,12 * * *"
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore agent state
        uses: actions/cache@v4
        with:
          path: data
          key: agent-state-${{ github.run_id }}
          restore-keys: |
            agent-state-
            seen-jobs-

      - name: Build
        run: npm run build

      - name: Send email digest
        run: npm start
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
          MOM_EMAIL_TO: ${{ secrets.MOM_EMAIL_TO }}
          MOM_CV_TEXT: ${{ secrets.MOM_CV_TEXT }}
          SISTER_EMAIL_TO: ${{ secrets.SISTER_EMAIL_TO }}
          SISTER_CV_TEXT: ${{ secrets.SISTER_CV_TEXT }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          ENABLE_AI_MATCHING: ${{ vars.ENABLE_AI_MATCHING || 'true' }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5-mini' }}
          CV_URL: ${{ vars.CV_URL || 'https://oswaldo-virtual-cv.vercel.app/es' }}
          AI_MAX_CANDIDATES: ${{ vars.AI_MAX_CANDIDATES || '20' }}
          AI_MIN_COMPATIBILITY_SCORE: ${{ vars.AI_MIN_COMPATIBILITY_SCORE || '80' }}
          ENABLE_SERPAPI: ${{ vars.ENABLE_SERPAPI || 'false' }}
          SERPAPI_LOCATION: ${{ vars.SERPAPI_LOCATION || 'Miami, Florida, United States' }}
          SERPAPI_GL: ${{ vars.SERPAPI_GL || 'us' }}
          SERPAPI_HL: ${{ vars.SERPAPI_HL || 'es' }}
          SERPAPI_MONTHLY_LIMIT: ${{ vars.SERPAPI_MONTHLY_LIMIT || '220' }}
          SERPAPI_RUN_EVERY_HOURS: ${{ vars.SERPAPI_RUN_EVERY_HOURS || '12' }}
          SERPAPI_MAX_QUERIES_PER_RUN: ${{ vars.SERPAPI_MAX_QUERIES_PER_RUN || '1' }}
          SERPAPI_QUERIES: ${{ vars.SERPAPI_QUERIES || '' }}
          LOOKBACK_DAYS: ${{ vars.LOOKBACK_DAYS || '7' }}
          MAX_JOBS_PER_EMAIL: ${{ vars.MAX_JOBS_PER_EMAIL || '20' }}
          SEND_EMPTY_DIGEST: ${{ vars.SEND_EMPTY_DIGEST || 'true' }}
          EXTRA_RSS_FEEDS: ${{ vars.EXTRA_RSS_FEEDS || '' }}
          ENABLE_MOM_NURSING_PROFILE: ${{ vars.ENABLE_MOM_NURSING_PROFILE || 'false' }}
          MOM_PROFILE_NAME: ${{ vars.MOM_PROFILE_NAME || 'Yuly Enfermeria Caracas' }}
          MOM_SUBJECT_PREFIX: ${{ vars.MOM_SUBJECT_PREFIX || 'Ofertas Enfermeria Caracas' }}
          MOM_LOCATION: ${{ vars.MOM_LOCATION || '' }}
          MOM_MIN_COMPATIBILITY_SCORE: ${{ vars.MOM_MIN_COMPATIBILITY_SCORE || '0' }}
          MOM_LOOKBACK_DAYS: ${{ vars.MOM_LOOKBACK_DAYS || '7' }}
          MOM_MAX_JOBS_PER_EMAIL: ${{ vars.MOM_MAX_JOBS_PER_EMAIL || '20' }}
          MOM_AI_MAX_CANDIDATES: ${{ vars.MOM_AI_MAX_CANDIDATES || '20' }}
          MOM_SERPAPI_RUN_EVERY_HOURS: ${{ vars.MOM_SERPAPI_RUN_EVERY_HOURS || '12' }}
          MOM_SERPAPI_MAX_QUERIES_PER_RUN: ${{ vars.MOM_SERPAPI_MAX_QUERIES_PER_RUN || '1' }}
          MOM_SERPAPI_QUERIES: ${{ vars.MOM_SERPAPI_QUERIES || '' }}
          ENABLE_SISTER_BAKERY_PROFILE: ${{ vars.ENABLE_SISTER_BAKERY_PROFILE || 'false' }}
          SISTER_PROFILE_NAME: ${{ vars.SISTER_PROFILE_NAME || 'Yuliana Pasteleria Panaderia Caracas' }}
          SISTER_SUBJECT_PREFIX: ${{ vars.SISTER_SUBJECT_PREFIX || 'Ofertas Pasteleria Panaderia Caracas' }}
          SISTER_LOCATION: ${{ vars.SISTER_LOCATION || '' }}
          SISTER_MIN_COMPATIBILITY_SCORE: ${{ vars.SISTER_MIN_COMPATIBILITY_SCORE || '0' }}
          SISTER_MAX_JOBS_PER_EMAIL: ${{ vars.SISTER_MAX_JOBS_PER_EMAIL || '20' }}
          SISTER_AI_MAX_CANDIDATES: ${{ vars.SISTER_AI_MAX_CANDIDATES || '20' }}
          SISTER_SERPAPI_RUN_EVERY_HOURS: ${{ vars.SISTER_SERPAPI_RUN_EVERY_HOURS || '12' }}
          SISTER_SERPAPI_MAX_QUERIES_PER_RUN: ${{ vars.SISTER_SERPAPI_MAX_QUERIES_PER_RUN || '1' }}
          SISTER_SERPAPI_QUERIES: ${{ vars.SISTER_SERPAPI_QUERIES || '' }}
