name: Job alert every 6 hours

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore agent state
        uses: actions/cache@v4
        with:
          path: data
          key: agent-state-${{ github.run_id }}
          restore-keys: |
            agent-state-
            seen-jobs-

      - name: Build
        run: npm run build

      - name: Send email digest
        run: npm start
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          ENABLE_AI_MATCHING: ${{ vars.ENABLE_AI_MATCHING || 'true' }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5-mini' }}
          CV_URL: ${{ vars.CV_URL || 'https://oswaldo-virtual-cv.vercel.app/es' }}
          AI_MAX_CANDIDATES: ${{ vars.AI_MAX_CANDIDATES || '20' }}
          AI_MIN_COMPATIBILITY_SCORE: ${{ vars.AI_MIN_COMPATIBILITY_SCORE || '80' }}
          ENABLE_SERPAPI: ${{ vars.ENABLE_SERPAPI || 'false' }}
          SERPAPI_LOCATION: ${{ vars.SERPAPI_LOCATION || 'Miami, Florida, United States' }}
          SERPAPI_GL: ${{ vars.SERPAPI_GL || 'us' }}
          SERPAPI_HL: ${{ vars.SERPAPI_HL || 'es' }}
          SERPAPI_MONTHLY_LIMIT: ${{ vars.SERPAPI_MONTHLY_LIMIT || '220' }}
          SERPAPI_RUN_EVERY_HOURS: ${{ vars.SERPAPI_RUN_EVERY_HOURS || '12' }}
          SERPAPI_MAX_QUERIES_PER_RUN: ${{ vars.SERPAPI_MAX_QUERIES_PER_RUN || '3' }}
          SERPAPI_QUERIES: ${{ vars.SERPAPI_QUERIES || '' }}
          LOOKBACK_DAYS: ${{ vars.LOOKBACK_DAYS || '7' }}
          MAX_JOBS_PER_EMAIL: ${{ vars.MAX_JOBS_PER_EMAIL || '20' }}
          SEND_EMPTY_DIGEST: ${{ vars.SEND_EMPTY_DIGEST || 'false' }}
          EXTRA_RSS_FEEDS: ${{ vars.EXTRA_RSS_FEEDS || '' }}
