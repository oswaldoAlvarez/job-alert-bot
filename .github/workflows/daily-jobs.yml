name: Job alert every 12 hours

on:
  schedule:
    - cron: "0 0,12 * * *"
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore agent state
        uses: actions/cache@v4
        with:
          path: data
          key: agent-state-${{ github.run_id }}
          restore-keys: |
            agent-state-
            seen-jobs-

      - name: Build
        run: npm run build

      - name: Send email digest
        run: npm start
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
          NURSING_EMAIL_TO: ${{ secrets.NURSING_EMAIL_TO }}
          NURSING_CV_TEXT: ${{ secrets.NURSING_CV_TEXT }}
          BAKERY_EMAIL_TO: ${{ secrets.BAKERY_EMAIL_TO }}
          BAKERY_CV_TEXT: ${{ secrets.BAKERY_CV_TEXT }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          ENABLE_AI_MATCHING: ${{ vars.ENABLE_AI_MATCHING || 'true' }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5-mini' }}
          CV_URL: ${{ vars.CV_URL || '' }}
          AI_MAX_CANDIDATES: ${{ vars.AI_MAX_CANDIDATES || '20' }}
          AI_MIN_COMPATIBILITY_SCORE: ${{ vars.AI_MIN_COMPATIBILITY_SCORE || '80' }}
          ENABLE_SERPAPI: ${{ vars.ENABLE_SERPAPI || 'false' }}
          SERPAPI_LOCATION: ${{ vars.SERPAPI_LOCATION || 'Miami, Florida, United States' }}
          SERPAPI_GL: ${{ vars.SERPAPI_GL || 'us' }}
          SERPAPI_HL: ${{ vars.SERPAPI_HL || 'es' }}
          SERPAPI_MONTHLY_LIMIT: ${{ vars.SERPAPI_MONTHLY_LIMIT || '220' }}
          SERPAPI_RUN_EVERY_HOURS: ${{ vars.SERPAPI_RUN_EVERY_HOURS || '12' }}
          SERPAPI_MAX_QUERIES_PER_RUN: ${{ vars.SERPAPI_MAX_QUERIES_PER_RUN || '1' }}
          SERPAPI_QUERIES: ${{ vars.SERPAPI_QUERIES || '' }}
          LOOKBACK_DAYS: ${{ vars.LOOKBACK_DAYS || '60' }}
          MAX_JOBS_PER_EMAIL: ${{ vars.MAX_JOBS_PER_EMAIL || '20' }}
          SEND_EMPTY_DIGEST: ${{ vars.SEND_EMPTY_DIGEST || 'true' }}
          EXTRA_RSS_FEEDS: ${{ vars.EXTRA_RSS_FEEDS || '' }}
          ENABLE_NURSING_PROFILE: ${{ vars.ENABLE_NURSING_PROFILE || 'false' }}
          NURSING_PROFILE_NAME: ${{ vars.NURSING_PROFILE_NAME || 'Perfil Enfermeria Caracas' }}
          NURSING_SUBJECT_PREFIX: ${{ vars.NURSING_SUBJECT_PREFIX || 'Ofertas Enfermeria Caracas' }}
          NURSING_LOCATION: ${{ vars.NURSING_LOCATION || '' }}
          NURSING_MIN_COMPATIBILITY_SCORE: ${{ vars.NURSING_MIN_COMPATIBILITY_SCORE || '0' }}
          NURSING_LOOKBACK_DAYS: ${{ vars.NURSING_LOOKBACK_DAYS || '7' }}
          NURSING_MAX_JOBS_PER_EMAIL: ${{ vars.NURSING_MAX_JOBS_PER_EMAIL || '20' }}
          NURSING_AI_MAX_CANDIDATES: ${{ vars.NURSING_AI_MAX_CANDIDATES || '20' }}
          NURSING_SERPAPI_RUN_EVERY_HOURS: ${{ vars.NURSING_SERPAPI_RUN_EVERY_HOURS || '12' }}
          NURSING_SERPAPI_MAX_QUERIES_PER_RUN: ${{ vars.NURSING_SERPAPI_MAX_QUERIES_PER_RUN || '1' }}
          NURSING_SERPAPI_QUERIES: ${{ vars.NURSING_SERPAPI_QUERIES || '' }}
          ENABLE_BAKERY_PROFILE: ${{ vars.ENABLE_BAKERY_PROFILE || 'false' }}
          BAKERY_PROFILE_NAME: ${{ vars.BAKERY_PROFILE_NAME || 'Perfil Pasteleria Panaderia Caracas' }}
          BAKERY_SUBJECT_PREFIX: ${{ vars.BAKERY_SUBJECT_PREFIX || 'Ofertas Pasteleria Panaderia Caracas' }}
          BAKERY_LOCATION: ${{ vars.BAKERY_LOCATION || '' }}
          BAKERY_MIN_COMPATIBILITY_SCORE: ${{ vars.BAKERY_MIN_COMPATIBILITY_SCORE || '0' }}
          BAKERY_MAX_JOBS_PER_EMAIL: ${{ vars.BAKERY_MAX_JOBS_PER_EMAIL || '20' }}
          BAKERY_AI_MAX_CANDIDATES: ${{ vars.BAKERY_AI_MAX_CANDIDATES || '20' }}
          BAKERY_SERPAPI_RUN_EVERY_HOURS: ${{ vars.BAKERY_SERPAPI_RUN_EVERY_HOURS || '12' }}
          BAKERY_SERPAPI_MAX_QUERIES_PER_RUN: ${{ vars.BAKERY_SERPAPI_MAX_QUERIES_PER_RUN || '1' }}
          BAKERY_SERPAPI_QUERIES: ${{ vars.BAKERY_SERPAPI_QUERIES || '' }}
